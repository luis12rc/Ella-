<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Día de la Mujer 💗</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background-color: #ffc1cc; /* fondo rosado sólido */
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
}

/* FOTOS EN ESQUINAS */
.corner {
    position: fixed;
    width: 80px;
    height: 80px;
    object-fit: cover;
    box-shadow: 0 0 15px white;
    filter: brightness(1.2);
}
.tl { top: 10px; left: 10px; }
.tr { top: 10px; right: 10px; }
.bl { bottom: 10px; left: 10px; }
.br { bottom: 10px; right: 10px; }

/* TÍTULO */
h1 {
    font-size: 2.5em;
    color: #ffdee9;
    text-shadow: 0 0 10px #fff, 0 0 20px pink, 0 0 30px #ff99cc;
    animation: glow 2s infinite alternate;
    text-align: center;
    margin-top: 20px;
    z-index: 1;
    position: relative;
}

/* ANIMACIÓN BRILLO */
@keyframes glow {
    0% { text-shadow: 0 0 10px #fff,0 0 20px pink,0 0 30px #ff99cc; }
    50% { text-shadow: 0 0 20px #fff,0 0 40px pink,0 0 60px #ff66aa; }
    100% { text-shadow: 0 0 10px #fff,0 0 20px pink,0 0 30px #ff99cc; }
}

/* TEXTO MÁQUINA */
#texto-dia {
    font-size: 1.2em;
    color: #ffe6f0;
    text-align: center;
    margin: 10px 15px 15px 15px;
    text-shadow: 0 0 5px #fff,0 0 10px pink;
    font-family: 'Courier New', monospace;
    border-right: 2px solid pink;
    white-space: pre-wrap;
    min-height: 50px;
    z-index: 1;
    position: relative;
}

/* VIDEO CENTRAL */
.central-container {
    position: relative;
    width: 60%;
    max-width: 250px;
    margin-bottom: 70px;
    z-index: 1;
}
#video2 {
    width: 100%;
    height: auto;
    max-height: 200px;
    border-radius: 12px;
    box-shadow: 0 0 25px white;
    display: block;
}

/* MUSICA */
.musica {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
    opacity: 0.5;
}
.musica audio { width: 180px; }

/* CORAZONES */
.heart {
    position: fixed;
    font-size: 16px;
    color: pink;
    animation: floatUp linear forwards;
    z-index: 2;
    pointer-events: none;
}
@keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-100vh) scale(1.3); opacity: 0; }
}
</style>
</head>
<body>

<!-- FOTOS -->
<img src="1.jpg" class="corner tl">
<img src="2.jpg" class="corner tr">
<img src="1.jpg" class="corner bl">
<img src="2.jpg" class="corner br">

<!-- TITULO -->
<h1>Feliz Día de la Mujer 💗</h1>

<!-- TEXTO -->
<div id="texto-dia"></div>

<!-- VIDEO CENTRAL -->
<div class="central-container">
    <video id="video2" controls preload="metadata">
        <source src="1.mp4" type="video/mp4">
    </video>
</div>

<!-- MUSICA -->
<div class="musica">
    <audio id="musica" loop preload="auto">
        <source src="cancion.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
// --- TEXTO MÁQUINA ---
const texto = "Hoy celebramos el Día de la Mujer, reconociendo la fuerza, valentía y belleza de todas las mujeres del mundo.";
const textoElemento = document.getElementById('texto-dia');
let index = 0;
function escribirTexto() {
    if(index < texto.length){
        textoElemento.innerHTML += texto.charAt(index);
        index++;
        setTimeout(escribirTexto, 50);
    } else {
        textoElemento.style.borderRight = 'none';
    }
}
escribirTexto();

// --- MUSICA ---
window.addEventListener('load', () => {
    const musica = document.getElementById('musica');
    musica.play().catch(() => {
        document.body.addEventListener('click', () => { musica.play(); }, { once: true });
    });
});

// --- CORAZONES OPTIMIZADOS ---
let corazonesActivos = 0;
function crearCorazon() {
    if(corazonesActivos >= 15) return; // max 15 corazones activos
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerText = '❤️';
    heart.style.left = Math.random()*100 + 'vw';
    heart.style.fontSize = (Math.random()*15 + 15) + 'px';
    const dur = Math.random()*5 + 4;
    heart.style.animationDuration = dur + 's';
    document.body.appendChild(heart);
    corazonesActivos++;
    setTimeout(() => { heart.remove(); corazonesActivos--; }, dur*1000);
}
setInterval(crearCorazon, 500);

// --- DETECCION ERRORES ---
function checkResources() {
    document.querySelectorAll('img').forEach(img => {
        img.onerror = () => { img.style.display='none'; console.warn('Imagen no cargada:', img.src); };
    });
    document.querySelectorAll('video').forEach(video => {
        video.onerror = () => console.warn('Video no cargado:', video.querySelector('source')?.src);
    });
    document.querySelectorAll('audio').forEach(audio => {
        audio.onerror = () => console.warn('Audio no cargado:', audio.querySelector('source')?.src);
    });
}
window.onload = () => { checkResources(); };
</script>
</body>
</html>
