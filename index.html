<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Día de la Mujer 💗</title>
<style>
/* --- ESTILOS GENERALES --- */
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background: linear-gradient(135deg, #ffc1cc, #ff9fc1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
}

/* --- VIDEO DE FONDO --- */
#video-fondo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
}

/* --- FOTOS EN ESQUINAS --- */
.corner {
    position: fixed;
    width: 100px;
    height: 100px;
    object-fit: cover;
    box-shadow: 0 0 20px white;
    filter: brightness(1.2);
}
.tl { top: 10px; left: 10px; }
.tr { top: 10px; right: 10px; }
.bl { bottom: 10px; left: 10px; }
.br { bottom: 10px; right: 10px; }

/* --- TÍTULO --- */
h1 {
    font-size: 3em;
    color: #ffdee9;
    text-shadow: 0 0 10px #fff, 0 0 20px pink, 0 0 30px #ff99cc;
    animation: glow 2s infinite alternate;
    text-align: center;
    margin-top: 30px;
    z-index: 1;
    position: relative;
}

/* --- ANIMACIÓN BRILLO --- */
@keyframes glow {
    0% { text-shadow: 0 0 10px #fff, 0 0 20px pink, 0 0 30px #ff99cc; }
    50% { text-shadow: 0 0 20px #fff, 0 0 40px pink, 0 0 60px #ff66aa; }
    100% { text-shadow: 0 0 10px #fff, 0 0 20px pink, 0 0 30px #ff99cc; }
}

/* --- TEXTO DE MÁQUINA DE ESCRIBIR --- */
#texto-dia {
    font-size: 1.5em;
    color: #ffe6f0;
    text-align: center;
    margin: 15px 20px 20px 20px;
    text-shadow: 0 0 5px #fff, 0 0 10px pink;
    font-family: 'Courier New', monospace;
    border-right: 3px solid pink;
    white-space: pre-wrap;
    min-height: 50px;
    z-index: 1;
    position: relative;
}

/* --- CONTENEDOR DEL VIDEO CENTRAL --- */
.central-container {
    position: relative;
    width: 50%;
    max-width: 300px;
    margin-bottom: 80px;
    z-index: 1;
}

/* --- VIDEO CENTRAL --- */
#video2 {
    width: 100%;
    height: auto;
    max-height: 250px;
    border-radius: 15px;
    box-shadow: 0 0 30px white;
    display: block;
}

/* --- REPRODUCTOR DE MUSICA --- */
.musica {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
    opacity: 0.5;
}
.musica audio {
    width: 200px;
}

/* --- CORAZONES ANIMADOS --- */
.heart {
    position: fixed;
    font-size: 20px;
    color: pink;
    animation: floatUp linear forwards;
    z-index: 2;
    pointer-events: none;
}

@keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
}
</style>
</head>
<body>

<!-- VIDEO DE FONDO -->
<video id="video-fondo" autoplay muted loop playsinline>
    <source src="fondo.mp4" type="video/mp4">
    Tu navegador no soporta vídeo.
</video>

<!-- FOTOS EN ESQUINAS -->
<img src="1.jpg" class="corner tl">
<img src="2.jpg" class="corner tr">
<img src="1.jpg" class="corner bl">
<img src="2.jpg" class="corner br">

<!-- TÍTULO -->
<h1>Feliz Día de la Mujer 💗</h1>

<!-- TEXTO MÁQUINA DE ESCRIBIR -->
<div id="texto-dia"></div>

<!-- VIDEO CENTRAL -->
<div class="central-container">
    <video id="video2" controls>
        <source src="1.mp4" type="video/mp4">
    </video>
</div>

<!-- REPRODUCTOR DE MUSICA -->
<div class="musica">
    <audio id="musica" loop>
        <source src="cancion.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
// --- TEXTO MÁQUINA DE ESCRIBIR ---
const texto = "Hoy celebramos el Día de la Mujer, reconociendo la fuerza, valentía y belleza de todas las mujeres del mundo.";
const textoElemento = document.getElementById('texto-dia');
let index = 0;

function escribirTexto() {
    if(index < texto.length){
        textoElemento.innerHTML += texto.charAt(index);
        index++;
        setTimeout(escribirTexto, 50);
    } else {
        textoElemento.style.borderRight = 'none';
    }
}
escribirTexto();

// --- REPRODUCCIÓN AUTOMÁTICA DE MÚSICA ---
window.addEventListener('load', () => {
    const musica = document.getElementById('musica');
    musica.play().catch(() => {
        document.body.addEventListener('click', () => { musica.play(); }, { once: true });
    });
});

// --- GENERAR CORAZONES ALEATORIOS ---
function crearCorazon() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerText = '❤️';
    heart.style.left = Math.random() * 100 + 'vw';
    const size = Math.random() * 20 + 20; 
    heart.style.fontSize = size + 'px';
    const dur = Math.random() * 5 + 4;
    heart.style.animationDuration = dur + 's';
    document.body.appendChild(heart);
    setTimeout(() => { heart.remove(); }, dur * 1000);
}
setInterval(crearCorazon, 400);

// --- BLOQUE DE DETECCIÓN DE ERRORES EN RECURSOS ---
function checkResources() {
    document.querySelectorAll('img').forEach(img => {
        img.onerror = () => {
            img.style.display = 'none';
            console.warn('Imagen no cargada:', img.src);
            const aviso = document.createElement('p');
            aviso.textContent = `No se pudo cargar la imagen: ${img.src}`;
            aviso.style.color = 'red';
            aviso.style.textAlign = 'center';
            document.body.appendChild(aviso);
        };
    });
    document.querySelectorAll('video').forEach(video => {
        video.onerror = () => console.warn('Video no cargado:', video.querySelector('source')?.src);
    });
    document.querySelectorAll('audio').forEach(audio => {
        audio.onerror = () => console.warn('Audio no cargado:', audio.querySelector('source')?.src);
    });
}
window.onload = () => { checkResources(); };
</script>

</body>
</html>
